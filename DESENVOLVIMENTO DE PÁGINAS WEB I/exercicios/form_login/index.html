<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,1,0" />

</head>
<body>
    <div>
        <div class="background_form">
            <header>
                Login
            </header>
            <div class="form">
                <form>
                    <label>
                        <div class="label">
                            <p class="title_input">Nome de usuário</p>
                            <span class="material-symbols-outlined">person</span>
                            <input type="text" placeholder="Digite o nome de usuário">
                        </div>
                    </label>
                    <label>
                        <div class="label">
                            <p class="title_input">Senha</p>
                            <span class="material-symbols-outlined">key</span>
                            <input type="password" placeholder="Digite sua senha">
                        </div>
                        <div class="esqueceu_senha">Esqueceu a senha?</div>
                    </label>
                </form>
                <div class="login">
                    Login
                </div>
            </div>
            <div class="outras_opcoes">
                <p>Ou faça login usando:</p>
                <div class="circulo facebock"></div>
                <div class="circulo x"></div>
                <div class="circulo google"></div>
            </div>
        </div>
    </div>
</body>
</html>
