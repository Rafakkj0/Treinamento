<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Entrar</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,300,0,0" />

</head>

<body>
    <div class="background_form">
        <header>
            Entrar
        </header>
        <div class="formulario">
            <form>
                <p class="input_title">Nome de usuário</p>
                <label>
                    <span class="material-symbols-rounded">person</span>
                    <input type="text" placeholder="Digite seu nome de usuário">
                </label>
                <p class="input_title">Senha</p>
                <label>
                    <span class="material-symbols-rounded">key</span>
                    <input type="password" placeholder="Digite sua senha">
                </label>
                <div class="esqueceu_senha">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="botao_entrar">Entrar</button>
            </form>
            <div class="login_outros">
                <p>Ou entre usando</p>
                <div class="apps">
                    <img src="https://z-m-static.xx.fbcdn.net/rsrc.php/yt/r/DUiOg0mJTjz.webp" width="50px">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/X_icon.svg/3840px-X_icon.svg.png" width="50px">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Google_Plus_logo_%282015-2019%29.svg/3840px-Google_Plus_logo_%282015-2019%29.svg.png" width="50px">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
