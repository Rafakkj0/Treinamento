<!DOCTYPE html>

<html>
    <head>
        <title>Tabelas</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header><h1 class="titulo">Jogos que eu zerei:</h1></header>
        <main>
            <section>
                <table border="2">
                    <tr>
                        <th>Capa</th><th>Nome</th><th>Avaliação</th>
                    </tr>
                    <tr>
                        <td><img width="150px" src="https://cdn2.steamgriddb.com/thumb/af0a25e27510f77d97634a6bbe653b13.jpg"></td>
                        <td>Grand Theft Auto V</td>
                        <td>⭐⭐⭐⭐⭐ - 5/5</td>
                    </tr>
                    <tr>
                        <td><img width="150px" src="https://cdn2.steamgriddb.com/thumb/3940304b536796dcc176aa83203a3955.jpg"></td>
                        <td>Red Dead Redemption II</td>
                        <td>⭐⭐⭐⭐⭐ - 5/5</td>
                    </tr>
                    <tr>
                        <td><img width="150px" src="https://cdn2.steamgriddb.com/thumb/72d0eaa80cc3412fda4a133ca1f884e8.jpg"></td>
                        <td>God of War (2005)</td>
                        <td>⭐⭐⭐⭐⭐ - 5/5</td>
                    </tr>
                </table>
                <br>
                <form>
                    <h3>O que você achou da minha lista?</h3>
                    <label>
                        <input type="radio" name="lista"> Legal e bunito!
                    </label>
                    <label>
                        <input type="radio" name="lista"> Mais eu menos.
                    </label>
                    <label>
                        <input type="radio" name="lista"> Num gostei 😒
                    </label>
                </form>
            </section>
        </main>
    </body>
</html>
