<!DOCTYPE html> <!--Usado para definnir a verção do HTML-->
<html>
    <head> <!--Coisas que não são apresentadas ao usuario na página-->
        <title>Site para acessar o google</title> <!--Título que aparece na aba-->
        <meta charset="utf-8"> <!--Usado para não ocorrer problemas com a acentuação-->
    </head>
    <body> <!--Coisas que seram apresentadas ao usuário, como texto, fotos e links.-->
        <p>Bem vindo ao nosso site especializado em te ajudar a abri o Google.</p> <!--<p> = Paragrafo-->
        Para abir o Google clique <a href="https://www.google.com/">aqui.</a> <!--<a> para colocar um link em um texto (criar hiperlink) | href serve para mostrar qual pagina o usúario será direcionado-->
    </body>
</html>
