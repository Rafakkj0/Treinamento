<!DOCTYPE html>
<html>
    <head>
        <title>Melhores sites</title> <!--Título que aparece na aba-->
        <meta charset="UTF-8"> <!--Evitar problemas com acentos-->
    </head>
    <body>
        <header> <!--Definir que isso é cabeçalho para facilitar recomendação nas pesquisas no google-->
            <h1> <!--h1 define titulo principal-->
                Melhores sites em 2026
            </h1>
        </header>
        <hr> <!--hr é uma divisoria feita com uma linha-->
        <nav> <!--Nav é para a navegação na pagina, tambem usado para ajudar nas pesquisa no google-->
            <a href="#rodape">Rodapé</a> <!--Hiper link que vai para a propia página, para isso no local onde quero ir é colocado um ID, por exemplo: <footer id="rodape">, se eu coloco no href #rodape vou ao local onde está esse ID-->
        </nav>
        <hr>
        <h2> <!--Subtitulo, na hierarquia ele é o segundo, seguindo os numeros na sua frente-->
            Rank de melhores sites:
        </h2>
        <ol> <!--Criar listas ordenadas/com números-->
            <li><a href="https://www.youtube.com/" target="_blank">YouTube</a></li> <!-- Define que isso é um objeto da lista-->
            <li><a href="https://www.reddit.com/" target="_blank">Reddit</a></li>
            <li><a href="https://www.friv.com/" target="_blank">Friv</a></li>
        </ol>
        <h2>
            Outros sites:
        </h2>
        <ul> <!--Cria lista que a ordem não inporta, vão aparecer bolinhas ao inves de números-->
            <li><a href="https://chatgpt.com/">Chat GPT</a></li> <!-- Define que isso é um objeto da linha-->
            <li><a href="https://www.google.com/">Google</a></li>
            <li><a href="https://gam.onl/">Gam.onl</a></li>
        </ul>
        <a href="https://www.youtube.com/results?search_query=gato" target="_blank"><img width="160px" src="https://img.freepik.com/fotos-gratis/close-vertical-de-um-lindo-gato-europeu-de-pelo-curto_181624-34587.jpg?semt=ais_hybrid&w=740&q=80"></a> <!-- É possivel colocar hiperlink em imagens também, para fazer isso é só ao inves de colocar texto, colocar <img> -->
        <hr>
        <footer id="rodape"> <!-- Footer serve para indicar que esse é o rodapé da pagina, usado para indicar aos sistams de pesquisa como o google que isso não é tão importante -->
            Copyamasnãofazigual © rafasites 2026
        </footer>
    </body>
</html>
